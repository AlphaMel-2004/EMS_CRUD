services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crud_learning_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Pakboys123}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./backend/CrudLearning.Api
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      JWT_SECRET: ${JWT_SECRET}
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=${POSTGRES_DB:-crud_learning_db};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-Pakboys123}
    ports:
      - "5299:8080"

  web:
    build:
      context: ./frontend/crud-client
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  postgres_data:
